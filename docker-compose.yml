# ISP Looking Glass - Docker Compose (Nginx + HTTPS)
# 推荐使用 scripts/local-deploy.sh 一键完成依赖安装、证书生成、构建与启动

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: looking_glass
      MYSQL_USER: lg_user
      MYSQL_PASSWORD: lg_password
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/looking_glass?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: lg_user
      SPRING_DATASOURCE_PASSWORD: lg_password
      LOOKING_GLASS_WORKER_URL: http://worker:8000
      LOOKING_GLASS_NGINX_CERT_DIR: /nginx/certs
      LOOKING_GLASS_NGINX_RELOAD_CMD: docker kill -s HUP $(docker ps -q --filter label=com.docker.compose.service=frontend | head -n1)
    volumes:
      - ./nginx/certs:/nginx/certs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
      worker:
        condition: service_started

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
