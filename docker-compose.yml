# ISP Looking Glass - Docker Compose (dev/test)
# 使用前: 在 backend 目录执行 ./gradlew bootJar 生成 jar；在 frontend 目录执行 npm run build 生成 dist

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: looking_glass
      MYSQL_USER: lg_user
      MYSQL_PASSWORD: lg_password
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/looking_glass?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: lg_user
      SPRING_DATASOURCE_PASSWORD: lg_password
      LOOKING_GLASS_WORKER_URL: http://worker:8000
    depends_on:
      mysql:
        condition: service_healthy
      worker:
        condition: service_started

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
