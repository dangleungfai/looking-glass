spring:
  application:
    name: looking-glass-backend
  datasource:
    url: jdbc:mysql://localhost:3306/looking_glass?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: lg_user
    password: lg_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

looking-glass:
  worker:
    url: http://localhost:8000
  nginx:
    cert-dir: ../nginx/certs

logging:
  level:
    root: INFO
    org.springframework.security: INFO
